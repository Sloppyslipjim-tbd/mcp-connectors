version: "3.8"

# Master Docker Compose — All Buddy MCP Connectors
# The Brands Den B.V.
#
# Usage:
#   docker-compose up -d          # Start all connectors
#   docker-compose up -d fivex    # Start just FiveX
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop all

services:
  fivex:
    build: ./fivex-mcp-server
    container_name: fivex-mcp
    ports:
      - "3001:3001"
    environment:
      - FIVEX_API_KEY=a37a68ecda4f2f16933ace52d301baf8
      - FIVEX_API_SECRET=363bdd0830fe1337ff4eae8a10dc1d6d1566e53578cd417a152667aaf532b751
      - FIVEX_BASE_URL=https://app.fivex.nl/api/v1
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bolcom-retailer:
